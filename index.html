<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>婚禮座位查詢</title>

<style>
body {
  font-family: "Microsoft JhengHei", Arial;
  text-align: center;
  margin: 0;
  padding: 50px;

  background-image: url("images/bg.png");
  background-size: auto;
  background-repeat: repeat;
  background-position: top left;
}

/* ⭐ 半透明白遮罩（讓字清楚） */
body::before {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(255,255,255,0.6);
  z-index:-1;
}

/* ⭐ Logo */
.logo-top {
  width: 160px;
  margin-bottom: 20px;
}

/* 標題 */
h1 {
  color: #3a5f8a;
  font-size: 30px;
  margin-bottom: 10px;
}

h2 {
  color: #6b8fb3;
  font-weight: normal;
  margin-bottom: 30px;
}

/* 輸入 */
input {
  padding: 12px;
  width: 260px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* 按鈕 */
button {
  padding: 12px 20px;
  margin-left: 10px;
  background: #7faee6;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #5f94d4;
}

/* 結果 */
#result {
  margin-top: 40px;
  font-size: 22px;
}

/* 圖片 */
img.result-img {
  margin-top: 20px;
  width: 220px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- ⭐ LOGO在最上面 -->
<img src="images/logo.png" class="logo-top">

<h1>因「偉」有你 「佳」才完整</h1>
<h2>婚禮座位查詢</h2>

<input id="name" placeholder="請輸入您的全名">
<button onclick="search()">查詢</button>

<div id="result"></div>

<script>

// ===== 名單 =====
const data = {

  "何佳穎": "主","何建賢": "主","何靜宜": "主","廖金珠": "主","簡維均": "主",
  "羅德聰": "主","江珮毓": "主","羅偉銓": "主","羅廖不": "主","林明鍾": "主","江林明鍾": "主",

  "羅偉綸": 1,"羅德欽": 1,"羅啓源": 1,

  "江聰雲": 2,"江文期": 2,"江長遠": 2,"江叡涵": 2,"李禮侑": 2,

  "陳匯中": 3,"安德森": 3,"丹尼爾": 3,"廖奕霖": 3,"謝昌霖": 3,"蔡宗洋": 3,

  "李奕璁": 4,"謝焌騰": 4,"王峻叡": 4,"林威德": 4,"賴傳憲": 4,"江家瑋": 4,

  "林建傑": 5,"林冠文": 5,"賴品誠": 5,"邱建霖": 5,"林建宏": 5,
  "蔡仲堯": 5,"劉冠麟": 5,"羅羽成": 5,

  "林銘昭": 6,"蔡寧得": 6,"李翠蘭": 6,"李翠嬌": 6,"徐坤麟": 6,"林家禾": 6,

  "何佳錂": 7,"張依晴": 7,"劉宗昀": 7,"劉宗桓": 7,"劉宗旻": 7,
  "李育蓉": 7,"吳柔勳": 7,"周冠邑": 7,

  "潘冠妤": 8,"郭宇珊": 8,"李映慈": 8,

  "黃品儒": 9,"黃佑德": 9,"顏瑞栩": 9,"張志豪": 9,
  "林方中": 9,"蘇琮哲": 9,"楊浚霆": 9,"李健瑋": 9,

  "蕭伊玹": 10,"林立涵": 10,"蔡馨雅": 10,"陳冠良": 10,
  "宋祖賢": 10,"林坤誼": 10,"張美珍": 10,

  "曾子耀": 11,"林軒霆": 11,"蔡耀竹": 11,"高銘譽": 11,
  "陳定榮": 11,"薛聖翰": 11,"曾子翔": 11,

  "黃宥朋": 12,"楊鈞皓": 12,"張家瑜": 12,
  "蕭湘縈": 12,"吳姿妤": 12,"李婷涵": 12
};

// ===== 查詢 =====
function search(){
  const name = document.getElementById("name").value.trim();
  const result = document.getElementById("result");

  if(data[name] !== undefined){
    const table = data[name];

    result.innerHTML = `
      您的座位在 <b style="color:#3a5f8a;">${table} 桌</b><br>
      <img src="images/${table}.png" class="result-img"><br><br>
      <span style="color:#6b8fb3;">婚禮見！</span>
    `;
  }else{
    result.innerHTML = `<span style="color:red;">查無資料，請確認姓名是否正確</span>`;
  }
}

document.getElementById("name").addEventListener("keydown", e=>{
  if(e.key==="Enter") search();
});

</script>

</body>
</html>
